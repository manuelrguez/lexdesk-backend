version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexdesk
      POSTGRES_USER: lexdesk_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  lexnet-scraper:
    build: ./workers/lexnet-scraper
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend

  whatsapp-bot:
    build: ./workers/whatsapp-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "3002:3002"
    depends_on:
      - backend

volumes:
  postgres_data:
